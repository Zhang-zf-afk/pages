<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生日快乐</title>
    <style>
        *{
            margin:0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000012;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 0;
        }
        .star-bg{
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }
        .text {
            font-size: 60px;
            font-weight: bold;
            letter-spacing: 6px;
            margin: 8px 0;
            animation: rainbow 2s linear infinite;
        }

        @keyframes rainbow {
            0% { color: #ff3366; text-shadow: 0 0 10px #ff3366; }
            25% { color: #ffcc00; text-shadow: 0 0 10px #ffcc00; }
            50% { color: #33ff99; text-shadow: 0 0 10px #33ff99; }
            75% { color: #3399ff; text-shadow: 0 0 10px #3399ff; }
            100% { color: #cc66ff; text-shadow: 0 0 10px #cc66ff; }
        }
    </style>
</head>
<body> 
    <canvas class="star-bg" id="starCanvas"></canvas>
    <div class="text">祝某某某</div>
    <div class="text">生日快乐</div>

    <script>
        // ✅ 修复 1：ID 写错了
        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');
        let stars = []; // ✅ 修复 2：变量名统一

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize); // ✅ 修复 3：window 小写

        class Star {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.radius = Math.random() * 4 + 0.5;
                this.alpha = Math.random();
                this.speed = Math.random() * 0.02 + 0.01;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                // ✅ 修复 4：模板字符串必须用反引号 `
                ctx.fillStyle = `rgba(255,255,255,${this.alpha})`;
                ctx.fill();
            }
            update() {
                this.alpha += this.speed;
                if (this.alpha < 0.1 || this.alpha > 1) {
                    this.speed = -this.speed;
                }
            }
        }

        function initStars(num = 220) {
            stars = [];
            for (let i = 0; i < num; i++) {
                stars.push(new Star());
            }
        }
        initStars();

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            stars.forEach(star => {
                star.update();
                star.draw();
            });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
