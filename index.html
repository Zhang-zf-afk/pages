<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 强制手机完美适配 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>生日快乐</title>
    <style>
        *{
            margin:0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000012;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 0;
        }
        .star-bg{
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
        }
        .text {
            font-size: clamp(32px, 8vw, 60px);
            font-weight: bold;
            letter-spacing: 4px;
            margin: 6px 0;
            transition: opacity 1s ease-in-out;
            animation: rainbow 2s linear infinite;
            color: #fff;
            text-align: center;
        }
        .text-group-2 {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            transition: opacity 1s ease;
        }

        /* 手机适配弹窗 */
        .wish-box {
            position: fixed;
            padding: 10px 16px;
            border-radius: 12px;
            font-weight: bold;
            z-index: 999;
            animation: fadeIn 0.6s ease;
            pointer-events: none;
            white-space: nowrap;
            max-width: 45vw;
        }
        @keyframes fadeIn {
            from{opacity:0; transform:scale(0.3);}
            to{opacity:1; transform:scale(1);}
        }

        @keyframes rainbow {
            0% { color: #ff3366; text-shadow: 0 0 8px #ff3366; }
            25% { color: #ffcc00; text-shadow: 0 0 8px #ffcc00; }
            50% { color: #33ff99; text-shadow: 0 0 8px #33ff99; }
            75% { color: #3399ff; text-shadow: 0 0 8px #3399ff; }
            100% { color: #cc66ff; text-shadow: 0 0 8px #cc66ff; }
        }
    </style>
</head>
<body> 
    <canvas class="star-bg" id="starCanvas"></canvas>

    <div class="text" id="text1">祝某某某</div>
    <div class="text" id="text2">生日快乐</div>

    <div class="text-group-2" id="group2">
        <div class="text" style="font-size: clamp(28px, 6vw, 45px);">祝愿你</div>
        <div class="text" style="font-size: clamp(28px, 6vw, 45px);">在以后能够</div>
    </div>

    <script>
        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');
        let stars = [];
        let meteors = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        class Star {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.radius = Math.random() * 0.5 + 0.3;
                this.alpha = Math.random();
                this.speed = Math.random() * 0.02 + 0.01;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255,255,255,${this.alpha})`;
                ctx.fill();
            }
            update() {
                this.alpha += this.speed;
                if (this.alpha < 0.1 || this.alpha > 1) {
                    this.speed = -this.speed;
                }
            }
        }

        class Meteor {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = 0;
                this.length = Math.random() * 60 + 30;
                this.speed = Math.random() * 6 + 4;
                this.angle = Math.PI / 4;
                this.alpha = 1;
            }
            draw() {
                ctx.save();
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(
                    this.x - this.length * Math.cos(this.angle),
                    this.y + this.length * Math.sin(this.angle)
                );
                ctx.strokeStyle = `rgba(255,255,255,${this.alpha})`;
                ctx.lineWidth = 1.5;
                ctx.restore();
            }
            update() {
                this.x -= this.speed * Math.cos(this.angle);
                this.y += this.speed * Math.sin(this.angle);
                this.alpha -= 0.015;
            }
            isOffScreen() {
                return this.x < 0 || this.y > canvas.height || this.alpha <= 0;
            }
        }

        function initStars(num = 180) {
            stars = [];
            for (let i = 0; i < num; i++) {
                stars.push(new Star());
            }
        }
        initStars();

        function spawnMeteor() {
            if (Math.random() < 0.008) {
                meteors.push(new Meteor());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            stars.forEach(star => {
                star.update();
                star.draw();
            });
            spawnMeteor();
            for (let i = meteors.length - 1; i >= 0; i--) {
                const meteor = meteors[i];
                meteor.update();
                meteor.draw();
                if (meteor.isOffScreen()) {
                    meteors.splice(i, 1);
                }
            }
            requestAnimationFrame(animate);
        }
        animate();

        // 文字切换
        setTimeout(() => {
            document.getElementById('text1').style.opacity = '0';
            document.getElementById('text2').style.opacity = '0';
            
            setTimeout(() => {
                document.getElementById('group2').style.opacity = '1';
                // 第二段1秒后弹窗爆发
                setTimeout(() => {
                    startRandomWishes();
                }, 1000);
            }, 500);
        }, 1000);

        // 祝福语库
        const wishes = [
            "天天开心", "永远幸福", "平安喜乐", "万事顺意",
            "身体健康", "心想事成", "无忧无虑", "前程似锦",
            "好运连连", "笑口常开", "岁岁无忧", "未来可期",
            "一路繁花", "平安顺遂", "快乐加倍", "万事胜意",
            "岁岁平安", "步步生花", "眼里有光", "心中有爱"
        ];

        function startRandomWishes() {
            // 手机端65个密集弹窗
            for(let i = 0; i < 65; i++){
                setTimeout(()=>{
                    createWish();
                }, i * 25);
            }
        }

        function createWish(){
            const box = document.createElement('div');
            box.className = 'wish-box';
            const text = wishes[Math.floor(Math.random() * wishes.length)];
            box.innerText = text;

            // 限制手机坐标，不会超出屏幕
            const maxX = window.innerWidth - 100;
            const maxY = window.innerHeight - 50;
            const x = Math.random() * maxX;
            const y = Math.random() * maxY;
            box.style.left = x + 'px';
            box.style.top = y + 'px';

            // 手机小字体
            const size = 12 + Math.random() * 8;
            box.style.fontSize = size + 'px';

            const colors = [
                'rgba(255,154,162,0.85)',
                'rgba(255,218,193,0.85)',
                'rgba(162,196,255,0.85)',
                'rgba(187,245,205,0.85)',
                'rgba(221,187,255,0.85)',
                'rgba(255,240,185,0.85)'
            ];
            box.style.background = colors[Math.floor(Math.random() * colors.length)];
            document.body.appendChild(box);

            // 停留7秒，缓慢淡出
            setTimeout(()=>{
                box.style.opacity = "0";
                box.style.transition = "opacity 2s";
                setTimeout(()=> box.remove(), 2000);
            }, 7000);
        }
    </script>
</body>
</html>
