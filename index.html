<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生日快乐</title>
    <style>
        *{
            margin:0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000012;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 0;
        }
        .star-bg{
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }
        .text {
            font-size: 60px;
            font-weight: bold;
            letter-spacing: 6px;
            margin: 8px 0;
            animation: rainbow 2s linear infinite;
        }

        @keyframes rainbow {
            0% { color: #ff3366; text-shadow: 0 0 10px #ff3366; }
            25% { color: #ffcc00; text-shadow: 0 0 10px #ffcc00; }
            50% { color: #33ff99; text-shadow: 0 0 10px #33ff99; }
            75% { color: #3399ff; text-shadow: 0 0 10px #3399ff; }
            100% { color: #cc66ff; text-shadow: 0 0 10px #cc66ff; }
        }
    </style>
</head>
<body> 
    <canvas class="star-bg" id="starCanvas"></canvas>
    <div class="text">祝某某某</div>
    <div class="text">生日快乐</div>

    <script>
        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');
        let stars = [];
        let meteors = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        // 星星类
        class Star {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.radius = Math.random() * 1.5 + 0.5;
                this.alpha = Math.random();
                this.speed = Math.random() * 0.02 + 0.01;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255,255,255,${this.alpha})`;
                ctx.fill();
            }
            update() {
                this.alpha += this.speed;
                if (this.alpha < 0.1 || this.alpha > 1) {
                    this.speed = -this.speed;
                }
            }
        }

        // 新增：流星类
        class Meteor {
            constructor() {
                // 从屏幕上方随机位置生成
                this.x = Math.random() * canvas.width;
                this.y = 0;
                // 流星长度和速度
                this.length = Math.random() * 300 + 50;
                this.speed = Math.random() * 10 + 8;
                this.angle = Math.PI / 4; // 45度角划过
                this.alpha = 1;
            }
            draw() {
                ctx.save();
                ctx.beginPath();
                // 流星拖尾效果
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(
                    this.x - this.length * Math.cos(this.angle),
                    this.y + this.length * Math.sin(this.angle)
                );
                ctx.strokeStyle = `rgba(255,255,255,${this.alpha})`;
                ctx.lineWidth = 2;
                ctx.lineCap = 'round';
                ctx.stroke();
                ctx.restore();
            }
            update() {
                this.x -= this.speed * Math.cos(this.angle);
                this.y += this.speed * Math.sin(this.angle);
                this.alpha -= 0.02;
            }
            // 流星飞出屏幕就移除
            isOffScreen() {
                return this.x < 0 || this.y > canvas.height || this.alpha <= 0;
            }
        }

        // 初始化星星
        function initStars(num = 220) {
            stars = [];
            for (let i = 0; i < num; i++) {
                stars.push(new Star());
            }
        }
        initStars();

        // 定时生成流星
        function spawnMeteor() {
            if (Math.random() < 0.01) { // 控制流星出现频率，数值越大越频繁
                meteors.push(new Meteor());
            }
        }

        // 动画循环
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 更新+绘制星星
            stars.forEach(star => {
                star.update();
                star.draw();
            });

            // 生成流星
            spawnMeteor();

            // 更新+绘制流星
            for (let i = meteors.length - 1; i >= 0; i--) {
                const meteor = meteors[i];
                meteor.update();
                meteor.draw();
                if (meteor.isOffScreen()) {
                    meteors.splice(i, 1);
                }
            }

            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
